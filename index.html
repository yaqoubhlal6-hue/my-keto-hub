
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دليل الكيتو الشامل | أسرع النتائج</title>
    <style>
        /* التنسيق الأساسي */
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; margin: 0; padding: 0; color: #333; }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; }
        
        /* الهيدر */
        header { text-align: center; padding: 40px 20px; }
        h1 { color: #2c3e50; }
        
        /* صندوق البيع */
        .cta-box { background: #28a745; color: white; padding: 30px; border-radius: 12px; text-align: center; margin-bottom: 40px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .btn { display: inline-block; background: white; color: #28a745; padding: 15px 30px; border-radius: 8px; text-decoration: none; font-weight: bold; margin-top: 15px; }
        
        /* قسم الوصفات */
        .section-title { margin-bottom: 20px; border-right: 5px solid #28a745; padding-right: 10px; }
        .recipe-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        
        /* بطاقة الوصفة */
        .card { background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .card-body { padding: 15px; }
        .card-body h3 { margin: 0 0 10px 0; font-size: 1.2rem; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>دليل وجبات الكيتو للتحضير السريع</h1>
    </header>

    <section class="cta-box">
        <h2>هل تريد توفير ساعات في المطبخ؟</h2>
        <p>احصل على خطة الـ 8-in-1 الكاملة (وصفات، جداول، وقوائم مشتريات).</p>
        <a href="ضع_رابط_منتجك_هنا" class="btn">احصل على النظام الكامل الآن</a>
    </section>

    <h2 class="section-title">أحدث وصفاتنا</h2>
    <div id="recipe-grid" class="recipe-grid">
        </div>
</div>

</body>
</html>
